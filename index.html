<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凡人修仙 · 卡牌肉鸽原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0d5c1;font-family:'SimSun','STSong',serif;overflow:hidden;height:100vh;user-select:none}
.hidden{display:none!important}
.btn{background:linear-gradient(135deg,#3d2b1f,#5a3d2b);border:2px solid #d4a574;color:#d4a574;padding:12px 40px;font-size:18px;cursor:pointer;border-radius:6px;font-family:inherit;transition:all .2s}
.btn:hover{background:linear-gradient(135deg,#5a3d2b,#7a5d4b);box-shadow:0 0 15px rgba(212,165,116,.4)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:8px 20px;font-size:14px}
/* Hub */
#hub-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;background:linear-gradient(180deg,#0d0d1a,#1a1a2e 50%,#2d1f3d);overflow-y:auto;padding:20px}
.hub-title{font-size:32px;color:#d4a574;text-shadow:0 0 20px rgba(212,165,116,.5);margin:20px 0 5px;letter-spacing:6px}
.hub-subtitle{color:#6a6a7e;font-size:13px;margin-bottom:15px}
.hub-info{background:#2a2a3e;border:1px solid #3a3a4e;border-radius:10px;padding:15px 25px;width:100%;max-width:400px;margin-bottom:15px;text-align:center}
.hub-info .realm{font-size:22px;color:#d4a574;margin-bottom:8px}
.hub-info .xiuwei-bar{width:100%;height:12px;background:#1a1a2e;border-radius:6px;overflow:hidden;margin:6px 0}
.hub-info .xiuwei-fill{height:100%;background:linear-gradient(90deg,#9b59b6,#8e44ad);border-radius:6px;transition:width .3s}
.hub-info .xiuwei-text{font-size:12px;color:#8a8a9e}
.hub-materials{display:flex;gap:20px;font-size:16px;margin-bottom:20px}
.hub-materials span{padding:6px 14px;background:#2a2a3e;border-radius:8px;border:1px solid #3a3a4e}
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;width:100%;max-width:400px;margin-bottom:20px}
.hub-btn{background:#2a2a3e;border:2px solid #4a4a5e;border-radius:12px;padding:25px 15px;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit;color:#e0d5c1}
.hub-btn:hover{border-color:#d4a574;box-shadow:0 0 15px rgba(212,165,116,.3);transform:translateY(-2px)}
.hub-btn .hb-icon{font-size:32px;margin-bottom:8px}
.hub-btn .hb-name{font-size:18px;color:#d4a574}
.hub-btn .hb-desc{font-size:11px;color:#6a6a7e;margin-top:4px}
.linggen-badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:16px;font-weight:bold;margin:6px 0}
.lg-fire{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid #e74c3c}
.lg-wood{background:rgba(46,204,113,.2);color:#2ecc71;border:1px solid #2ecc71}
.lg-earth{background:rgba(243,156,18,.2);color:#f39c12;border:1px solid #f39c12}
.lg-metal{background:rgba(189,195,199,.2);color:#bdc3c7;border:1px solid #bdc3c7}
.lg-water{background:rgba(52,152,219,.2);color:#3498db;border:1px solid #3498db}
/* Modal overlay */
.modal{position:absolute;inset:0;background:rgba(10,10,20,.95);z-index:60;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto}
.modal h2{color:#d4a574;font-size:24px;margin:10px 0 20px}
.modal-close{position:absolute;top:15px;right:20px;font-size:28px;color:#6a6a7e;cursor:pointer;background:none;border:none;font-family:inherit}
.modal-close:hover{color:#d4a574}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:400px;margin-bottom:20px}
.recipe-card{background:#2a2a3e;border:2px solid #4a4a5e;border-radius:10px;padding:15px;cursor:pointer;transition:all .2s;text-align:center}
.recipe-card:hover:not(.disabled){border-color:#d4a574;box-shadow:0 0 10px rgba(212,165,116,.3)}
.recipe-card.disabled{opacity:.4;cursor:not-allowed}
.recipe-card .rc-name{font-size:15px;color:#d4a574;margin-bottom:6px}
.recipe-card .rc-desc{font-size:12px;color:#8a8a9e;margin-bottom:8px}
.recipe-card .rc-cost{font-size:12px;color:#6a6a7e}
.equipped-section{width:100%;max-width:400px;margin-bottom:15px}
.equipped-section h3{font-size:14px;color:#6a6a7e;margin-bottom:8px}
.eq-slots{display:flex;gap:8px;flex-wrap:wrap}
.eq-slot{background:#2a2a3e;border:1px solid #4a4a5e;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;transition:all .2s}
.eq-slot:hover{border-color:#e74c3c}
.eq-slot .eq-name{color:#d4a574}
.eq-slot .eq-unequip{font-size:10px;color:#e74c3c;margin-left:6px}
.inv-item{background:#2a2a3e;border:1px solid #4a4a5e;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;display:inline-block;margin:4px;transition:all .2s}
.inv-item:hover{border-color:#2ecc71}
.cultivate-area{display:flex;flex-direction:column;align-items:center;gap:15px}
.cultivate-btn{font-size:24px;padding:20px 50px;border-radius:50%;width:120px;height:120px;background:radial-gradient(circle,#5a3d2b,#3d2b1f);border:3px solid #d4a574;color:#d4a574;cursor:pointer;font-family:inherit;transition:all .3s;display:flex;align-items:center;justify-content:center}
.cultivate-btn:hover{box-shadow:0 0 30px rgba(212,165,116,.5);transform:scale(1.05)}
.cultivate-btn:disabled{opacity:.3;cursor:not-allowed}
.breakthrough-btn{background:linear-gradient(135deg,#8e44ad,#9b59b6);border:2px solid #d4a574;color:#f1c40f;padding:15px 40px;font-size:20px;cursor:pointer;border-radius:8px;font-family:inherit;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(241,196,15,.3)}50%{box-shadow:0 0 25px rgba(241,196,15,.6)}}
/* 丹药选择 */
#drug-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d0d1a,#1a1a2e)}
#drug-screen h2{color:#d4a574;font-size:28px;margin-bottom:30px}
.drug-select{display:flex;gap:30px;margin-bottom:40px;flex-wrap:wrap;justify-content:center}
.drug-item{background:#2a2a3e;border:2px solid #4a4a5e;border-radius:10px;padding:20px;width:140px;text-align:center}
.drug-item .name{color:#d4a574;font-size:18px;margin-bottom:8px}
.drug-item .desc{color:#8a8a9e;font-size:13px;margin-bottom:15px;min-height:40px}
.drug-item .ctrl{display:flex;align-items:center;justify-content:center;gap:15px}
.drug-item .ctrl span{font-size:20px;color:#e0d5c1;min-width:24px}
.drug-item .ctrl button{width:30px;height:30px;border-radius:50%;border:1px solid #d4a574;background:transparent;color:#d4a574;font-size:18px;cursor:pointer}
/* 战斗 */
#battle-screen{position:absolute;inset:0;display:flex;flex-direction:column;background:linear-gradient(180deg,#0d0d1a 0%,#1a1a2e 30%,#2d1f3d 100%)}
#enemy-area{flex:0 0 180px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.enemy-name{font-size:20px;color:#d4a574;margin-bottom:8px}
.enemy-sprite{width:100px;height:100px;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:8px;transition:filter .2s}
.enemy-sprite.hurt{filter:brightness(3) saturate(0)}
.enemy-hp-bar{width:300px;height:14px;background:#3a1a1a;border-radius:7px;border:1px solid #5a3a2a;overflow:hidden;margin-bottom:6px}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#c0392b,#e74c3c);transition:width .4s;border-radius:7px}
.enemy-hp-text{font-size:13px;color:#c0392b;margin-bottom:4px}
.enemy-intent{display:flex;align-items:center;gap:8px;font-size:16px;color:#e0d5c1;padding:6px 16px;background:rgba(0,0,0,.3);border-radius:6px;margin-bottom:4px}
.enemy-status{display:flex;gap:8px;font-size:12px;min-height:20px}
.status-badge{padding:2px 8px;border-radius:4px;font-size:12px}
.status-burn{background:rgba(231,76,60,.3);color:#e74c3c}
.status-poison{background:rgba(46,204,113,.3);color:#2ecc71}
.status-block{background:rgba(127,140,141,.3);color:#95a5a6}
.status-str{background:rgba(243,156,18,.3);color:#f39c12}
/* 进度条 */
#progress-bar{height:30px;background:#111;border-bottom:1px solid #2a2a3e;display:flex;align-items:center;padding:0 15px;gap:8px;font-size:13px;color:#6a6a7e}
.progress-node{width:24px;height:24px;border-radius:50%;border:2px solid #3a3a4e;display:flex;align-items:center;justify-content:center;font-size:11px}
.progress-node.done{border-color:#27ae60;color:#27ae60;background:rgba(39,174,96,.15)}
.progress-node.current{border-color:#d4a574;color:#d4a574;background:rgba(212,165,116,.15);box-shadow:0 0 8px rgba(212,165,116,.3)}
.progress-node.elite{border-color:#e74c3c;color:#e74c3c}
.progress-node.boss{border-color:#f1c40f;color:#f1c40f;font-size:14px}
.progress-line{width:12px;height:2px;background:#2a2a3e}
/* 日志 */
#log-area{flex:0 0 100px;overflow-y:auto;padding:8px 20px;border-top:1px solid #2a2a3e;border-bottom:1px solid #2a2a3e;background:rgba(0,0,0,.2);font-size:13px;line-height:1.6}
#log-area::-webkit-scrollbar{width:4px}
#log-area::-webkit-scrollbar-thumb{background:#3a3a4e;border-radius:2px}
.log-damage{color:#e74c3c}.log-heal{color:#2ecc71}.log-block{color:#95a5a6}.log-burn{color:#e67e22}.log-info{color:#d4a574}.log-combo{color:#f1c40f;font-weight:bold}
/* 玩家 */
#player-area{flex:1;display:flex;flex-direction:column}
#player-info{display:flex;align-items:center;padding:10px 20px;gap:20px;border-bottom:1px solid #2a2a3e;flex-wrap:wrap}
.player-hp-bar{width:200px;height:16px;background:#3a1a1a;border-radius:8px;border:1px solid #5a3a2a;overflow:hidden}
.player-hp-fill{height:100%;background:linear-gradient(90deg,#27ae60,#2ecc71);transition:width .4s;border-radius:8px}
.player-hp-text{font-size:13px;color:#2ecc71}
.player-stat{display:flex;align-items:center;gap:4px;font-size:15px}
.spirit-orb{color:#3498db}
.block-icon{color:#95a5a6}
.player-status{display:flex;gap:6px;margin-left:auto}
#end-turn-btn{margin-left:20px}
#hand-area{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 20px;gap:8px;flex-wrap:wrap;min-height:160px;position:relative}
/* 丹药栏 */
#drug-bar{position:absolute;right:20px;bottom:170px;display:flex;flex-direction:column;gap:6px}
.drug-btn{background:#2a2a3e;border:1px solid #4a4a5e;color:#8a8a9e;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.drug-btn:hover:not(:disabled){border-color:#d4a574;color:#d4a574}
.drug-btn:disabled{opacity:.3;cursor:not-allowed}
/* 卡牌 */
.card{width:110px;height:155px;background:#2a2a3e;border:2px solid #4a4a5e;border-radius:8px;cursor:pointer;transition:all .25s;position:relative;display:flex;flex-direction:column;padding:6px}
.card:hover{transform:translateY(-20px) scale(1.1);z-index:10;box-shadow:0 8px 25px rgba(0,0,0,.5)}
.card.disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.card .cost{position:absolute;top:-8px;left:-8px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#fff;background:#3498db;border:2px solid #2980b9}
.card .card-name{font-size:13px;color:#d4a574;text-align:center;margin-top:16px;margin-bottom:4px;line-height:1.2}
.card .card-desc{font-size:10px;color:#8a8a9e;text-align:center;flex:1;line-height:1.4;overflow:hidden}
.card .card-type{font-size:9px;text-align:center;color:#5a5a6e;border-top:1px solid #3a3a4e;padding-top:3px}
.card-fire{border-color:#e74c3c}.card-fire .cost{background:#c0392b;border-color:#e74c3c}
.card-wood{border-color:#27ae60}.card-wood .cost{background:#1e8449;border-color:#27ae60}
.card-earth{border-color:#f39c12}.card-earth .cost{background:#d68910;border-color:#f39c12}
.card-water{border-color:#3498db}.card-water .cost{background:#2471a3;border-color:#3498db}
.card-none{border-color:#9b59b6}.card-none .cost{background:#7d3c98;border-color:#9b59b6}
.card-metal{border-color:#bdc3c7}.card-metal .cost{background:#7f8c8d;border-color:#bdc3c7}
.combo-popup{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#f1c40f;font-weight:bold;text-shadow:0 0 20px rgba(241,196,15,.6);animation:comboPop 1s forwards;pointer-events:none;z-index:100}
@keyframes comboPop{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}
/* 选卡/事件 */
#card-select-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,20,.95);z-index:50}
#card-select-screen h2{color:#d4a574;font-size:24px;margin-bottom:30px}
.card-choices{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
.card-choice{width:130px;height:180px;background:#2a2a3e;border:2px solid #4a4a5e;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;padding:8px;position:relative}
.card-choice:hover{transform:translateY(-10px);border-color:#d4a574;box-shadow:0 5px 20px rgba(212,165,116,.3)}
.card-choice .cost{position:absolute;top:-8px;left:-8px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#fff;background:#3498db;border:2px solid #2980b9}
/* 休息事件 */
#rest-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,20,.95);z-index:50}
#rest-screen h2{color:#d4a574;font-size:24px;margin-bottom:30px}
.rest-options{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
.rest-option{background:#2a2a3e;border:2px solid #4a4a5e;border-radius:10px;padding:20px 30px;cursor:pointer;text-align:center;transition:all .2s;min-width:150px}
.rest-option:hover{border-color:#d4a574;box-shadow:0 0 15px rgba(212,165,116,.3)}
.rest-option .ro-title{font-size:18px;color:#d4a574;margin-bottom:8px}
.rest-option .ro-desc{font-size:13px;color:#8a8a9e}
/* 结算 */
#end-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,20,.95);z-index:50}
#end-screen h2{font-size:36px;margin-bottom:20px}
.result-text{font-size:18px;color:#8a8a9e;margin-bottom:10px}
.deck-list{max-height:200px;overflow-y:auto;margin-bottom:20px;font-size:13px;color:#8a8a9e;line-height:1.8}
.reward-text{font-size:16px;color:#2ecc71;margin:10px 0}
</style>
</head>
<body>

<!-- 主界面/洞府 -->
<div id="hub-screen">
  <div class="hub-title">凡人修仙</div>
  <div class="hub-subtitle">卡牌肉鸽 · v0.3</div>
  <div class="hub-info" id="hub-char-info"></div>
  <div class="hub-materials" id="hub-materials"></div>
  <div class="hub-grid">
    <div class="hub-btn" onclick="enterDungeonFlow()"><div class="hb-icon">⚔️</div><div class="hb-name">历练</div><div class="hb-desc">进入幽冥谷</div></div>
    <div class="hub-btn" onclick="showCultivate()"><div class="hb-icon">🧘</div><div class="hb-name">修炼</div><div class="hb-desc">打坐积攒修为</div></div>
    <div class="hub-btn" onclick="showAlchemy()"><div class="hb-icon">⚗️</div><div class="hb-name">炼丹</div><div class="hb-desc">炼制灵丹妙药</div></div>
    <div class="hub-btn" onclick="showRefine()"><div class="hb-icon">🔨</div><div class="hb-name">炼器</div><div class="hb-desc">炼制法器法宝</div></div>
  </div>
  <button class="btn btn-sm" onclick="showInventory()" style="color:#8a8a9e;border-color:#5a5a6e">📦 背包</button>
</div>

<!-- 修炼弹窗 -->
<div id="cultivate-modal" class="modal hidden">
  <button class="modal-close" onclick="closeModal('cultivate-modal')">✕</button>
  <h2>🧘 洞府修炼</h2>
  <div id="cultivate-info" class="hub-info" style="margin-bottom:20px"></div>
  <div class="cultivate-area" id="cultivate-area"></div>
</div>

<!-- 炼丹弹窗 -->
<div id="alchemy-modal" class="modal hidden">
  <button class="modal-close" onclick="closeModal('alchemy-modal')">✕</button>
  <h2>⚗️ 炼丹炉</h2>
  <div style="color:#6a6a7e;font-size:14px;margin-bottom:10px">当前灵草：<span id="alchemy-herbs" style="color:#2ecc71">0</span></div>
  <div class="recipe-grid" id="alchemy-recipes"></div>
  <div class="equipped-section" id="alchemy-equipped"></div>
</div>

<!-- 炼器弹窗 -->
<div id="refine-modal" class="modal hidden">
  <button class="modal-close" onclick="closeModal('refine-modal')">✕</button>
  <h2>🔨 炼器台</h2>
  <div style="color:#6a6a7e;font-size:14px;margin-bottom:10px">当前矿石：<span id="refine-ores" style="color:#f39c12">0</span></div>
  <div class="recipe-grid" id="refine-recipes"></div>
  <div class="equipped-section" id="refine-equipped"></div>
</div>

<!-- 背包弹窗 -->
<div id="inventory-modal" class="modal hidden">
  <button class="modal-close" onclick="closeModal('inventory-modal')">✕</button>
  <h2>📦 储物袋</h2>
  <div id="inv-content"></div>
</div>

<!-- 丹药选择 -->
<div id="drug-screen" class="hidden">
  <h2>🏥 准备丹药</h2>
  <p style="color:#8a8a9e;margin-bottom:20px">选择携带进入秘境的丹药（总量上限5瓶）</p>
  <div class="drug-select" id="drug-select"></div>
  <button class="btn" onclick="enterDungeon()">进入幽冥谷</button>
</div>

<!-- 战斗 -->
<div id="battle-screen" class="hidden">
  <div id="progress-bar"></div>
  <div id="enemy-area">
    <div class="enemy-name" id="enemy-name"></div>
    <div class="enemy-sprite" id="enemy-sprite"></div>
    <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp-fill"></div></div>
    <div class="enemy-hp-text" id="enemy-hp-text"></div>
    <div class="enemy-intent" id="enemy-intent"></div>
    <div class="enemy-status" id="enemy-status"></div>
  </div>
  <div id="log-area"></div>
  <div id="player-area">
    <div id="player-info">
      <div><div class="player-hp-bar"><div class="player-hp-fill" id="player-hp-fill"></div></div><div class="player-hp-text" id="player-hp-text"></div></div>
      <div class="player-stat spirit-orb" id="spirit-display">🔮 3/3</div>
      <div class="player-stat block-icon" id="block-display">🛡️ 0</div>
      <div class="player-status" id="player-status"></div>
      <button class="btn btn-sm" id="end-turn-btn" onclick="endPlayerTurn()">结束回合</button>
    </div>
    <div id="hand-area"></div>
  </div>
  <div id="drug-bar"></div>
</div>

<div id="card-select-screen" class="hidden">
  <h2 id="card-select-title">✨ 选择一张卡牌加入牌组</h2>
  <div class="card-choices" id="card-choices"></div>
  <div style="display:flex;gap:15px">
    <button class="btn btn-sm" onclick="skipCard()" style="color:#8a8a9e;border-color:#5a5a6e">跳过</button>
  </div>
</div>

<div id="rest-screen" class="hidden">
  <h2>🏕️ 灵泉 · 休整</h2>
  <div class="rest-options">
    <div class="rest-option" onclick="restHeal()"><div class="ro-title">🧘 休息</div><div class="ro-desc">回复30%最大生命</div></div>
    <div class="rest-option" onclick="restUpgrade()"><div class="ro-title">⬆️ 修炼</div><div class="ro-desc">升级1张卡牌</div></div>
    <div class="rest-option" onclick="restRemove()"><div class="ro-title">🗑️ 精炼</div><div class="ro-desc">移除1张卡牌</div></div>
  </div>
</div>

<div id="end-screen" class="hidden">
  <h2 id="end-title"></h2>
  <div class="result-text" id="end-desc"></div>

// ===== 工具 =====
function $(id){return document.getElementById(id)}
const ALL_SCREENS=['hub-screen','drug-screen','battle-screen','card-select-screen','rest-screen','end-screen'];
function show(id){ALL_SCREENS.forEach(s=>$(s).classList.add('hidden'));$(id).classList.remove('hidden')}
function showModal(id){$(id).classList.remove('hidden')}
function closeModal(id){$(id).classList.add('hidden')}
function log(m,c='log-info'){$('log-area').innerHTML+=`<div class="${c}">${m}</div>`;$('log-area').scrollTop=$('log-area').scrollHeight}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=rand(0,i);[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function getRealmName(){return REALM_NAMES[char.realm]||'渡劫'}
function getNextXp(){return REALM_XP[char.realm+1]||99999}

// ===== 主界面 =====
function renderHub(){
  let lg=char.linggen;
  $('hub-char-info').innerHTML=`
    <div class="linggen-badge ${LG_CSS[lg]}">${EL_EMOJI[lg]} ${LG_CN[lg]}</div>

// ===== 修炼系统 =====
function showCultivate(){
  renderCultivate();
  showModal('cultivate-modal');
}
function renderCultivate(){
  let canBreak=char.xiuwei>=getNextXp()&&char.realm<REALM_NAMES.length-1;
  $('cultivate-info').innerHTML=`
    <div class="realm">${getRealmName()}</div>
    <div class="xiuwei-bar"><div class="xiuwei-fill" style="width:${Math.min(100,char.xiuwei/getNextXp()*100)}%"></div></div>
    <div class="xiuwei-text">修为 ${char.xiuwei} / ${getNextXp()}</div>`;
  $('cultivate-area').innerHTML=`
    <button class="cultivate-btn" onclick="doCultivate()">🧘<br><span style="font-size:12px">打坐</span></button>
    ${canBreak?'<button class="breakthrough-btn" onclick="doBreakthrough()">✨ 突破境界 ✨</button>':''}
    <div style="color:#6a6a7e;font-size:13px">每次打坐获得10~30修为</div>`;
}
function doCultivate(){
  let gain=rand(10,30);
  char.xiuwei+=gain;
  saveChar();
  renderCultivate();
}
function doBreakthrough(){
  if(char.xiuwei<getNextXp()||char.realm>=REALM_NAMES.length-1)return;
  char.xiuwei-=getNextXp();
  char.realm++;
  saveChar();
  renderCultivate();
  renderHub();
}

// ===== 炼丹系统 =====
function showAlchemy(){
  renderAlchemy();
  showModal('alchemy-modal');
}
function renderAlchemy(){
  $('alchemy-herbs').textContent=char.lingcao;
  let html='';
  PILL_RECIPES.forEach(r=>{
    let can=char.lingcao>=r.cost;
    html+=`<div class="recipe-card${can?'':' disabled'}" onclick="${can?`craftPill('${r.id}')`:''}">
      <div class="rc-name">${r.name}</div><div class="rc-desc">${r.desc}</div><div class="rc-cost">🌿×${r.cost}</div></div>`;
  });
  $('alchemy-recipes').innerHTML=html;
  renderPillSlots();
}
function craftPill(id){
  let r=PILL_RECIPES.find(p=>p.id===id);
  if(!r||char.lingcao<r.cost)return;
  char.lingcao-=r.cost;
  char.ownedPills.push({...r.effect,_name:r.name,_id:r.id});
  saveChar();renderAlchemy();renderHub();
}
function renderPillSlots(){
  let html='<h3>已装备丹药 ('+char.equippedPills.length+'/3)</h3><div class="eq-slots">';
  char.equippedPills.forEach((p,i)=>{
    html+=`<div class="eq-slot" onclick="unequipPill(${i})"><span class="eq-name">${p._name}</span><span class="eq-unequip">卸下</span></div>`;
  });
  html+='</div>';
  // 未装备
  let unequipped=char.ownedPills.filter(p=>!char.equippedPills.includes(p));
  if(unequipped.length>0){
    html+='<h3 style="margin-top:12px">未装备</h3><div>';
    unequipped.forEach((p,i)=>{
      let idx=char.ownedPills.indexOf(p);
      html+=`<div class="inv-item" onclick="equipPill(${idx})">${p._name}</div>`;
    });
    html+='</div>';
  }
  $('alchemy-equipped').innerHTML=html;
}
function equipPill(idx){
  if(char.equippedPills.length>=3)return;
  let p=char.ownedPills[idx];
  if(!p||char.equippedPills.includes(p))return;
  char.equippedPills.push(p);
  saveChar();renderAlchemy();
}
function unequipPill(i){
  char.equippedPills.splice(i,1);
  saveChar();renderAlchemy();
}

function enterDungeonFlow(){
  show('drug-screen');G.drugs={};DRUGS.forEach((_,i)=>G.drugs[i]=0);renderDrugSel();
}
function renderDrugSel(){
  let ds=$('drug-select');ds.innerHTML='';
  DRUGS.forEach((d,i)=>{
    let cnt=G.drugs[i]||0;
    let el=document.createElement('div');el.className='drug-item';
    el.innerHTML=`<div class="name">${d.name}</div><div class="desc">${d.desc}<br>(上限${d.max}瓶)</div><div class="ctrl"><button onclick="adjDrug(${i},-1)">-</button><span>${cnt}</span><button onclick="adjDrug(${i},1)">+</button></div>`;
    ds.appendChild(el);
  });
}
window.adjDrug=function(i,d){let d2=DRUGS[i],total=Object.values(G.drugs).reduce((a,b)=>a+b,0);let nv=(G.drugs[i]||0)+d;if(nv<0||nv>d2.max)return;if(d>0&&total>=5)return;G.drugs[i]=nv;renderDrugSel()};

function enterDungeon(){
  G.deck=initDeck();G.nodeIdx=0;G.fireCrowBonus=0;G.danYiStacks=0;G.baicaoPerTurn=0;G.killedElite=0;
  G.runLingcao=0;G.runKuangshi=0;
  // 应用境界加成
  let realmBonus=char.realm;
  G.maxHp=40+realmBonus*5;
  G.maxSp=3+(realmBonus>=3?1:0)+(realmBonus>=6?1:0);
  // 应用丹药加成
  char.equippedPills.forEach(p=>{
    if(p.maxHp) G.maxHp+=p.maxHp;
    if(p.sp) G.maxSp+=p.sp;
  });
  G.hp=G.maxHp;G.sp=G.maxSp;G.blk=0;
  // 初始格挡加成
  char.equippedPills.forEach(p=>{if(p.block) G.blk+=p.block});
  // 土灵根加成
  if(char.linggen==='earth') G.blk+=3;
  nextNode();
}

function renderProgress(){
  let pb=$('progress-bar');pb.innerHTML='<span style="color:#5a5a6e">幽冥谷</span>';
  MAP.forEach((t,i)=>{
    let cls='progress-node';
    if(i<G.nodeIdx) cls+=' done';
    else if(i===G.nodeIdx) cls+=' current';
    if(t==='E') cls+=' elite';
    if(t==='B') cls+=' boss';
    let label=t==='F'?'⚔':t==='E'?'💀':t==='R'?'🏕️':'👑';
    if(i>0) pb.innerHTML+='<div class="progress-line"></div>';
    pb.innerHTML+=`<div class="${cls}">${label}</div>`;
  });
}

function nextNode(){
  if(G.nodeIdx>=MAP.length){victory();return}
  let t=MAP[G.nodeIdx];
  if(t==='F') startFight(false);
  else if(t==='E') startFight(true);
  else if(t==='R') showRest();
  else if(t==='B') startBoss();
}

function pickEnemy(pool){return pool[rand(0,pool.length-1)]}

function startFight(isElite){
  show('battle-screen');
  let template=isElite?pickEnemy(ELITE_ENEMIES):pickEnemy(NORMAL_ENEMIES);
  let hp=rand(template.hp[0],template.hp[1]);
  let scale=1+G.nodeIdx*0.04;
  hp=Math.round(hp*scale);
  initEnemy(template,hp);
  G.inBattle=true;G.intIdx=0;G.turn=0;G.drugUsed=false;G.nextAtk=0;G.playHist={};
  $('log-area').innerHTML='';
  log(`—— ${G.ename} 出现了！ (${hp}HP) ——`,'log-info');
  renderProgress();
  shuffleIntoDeck();
  startTurn();
}

function startBoss(){
  show('battle-screen');
  let hp=rand(BOSS.hp[0],BOSS.hp[1]);
  initEnemy(BOSS,hp);
  G.inBattle=true;G.intIdx=0;G.turn=0;G.drugUsed=false;G.nextAtk=0;G.playHist={};
  $('log-area').innerHTML='';
  log(`—— 👑 Boss：${G.ename} 出现了！(${hp}HP) ——`,'log-combo');
  renderProgress();
  shuffleIntoDeck();
  startTurn();
}

function initEnemy(t,hp){
  G.ehp=hp;G.eMaxHp=hp;G.eblk=0;G.eburn=0;G.epoison=0;
  G.ename=t.name;G.espr=t.spr;G.etemplate=t;
  if(t.hp2){G.ehp2=rand(t.hp2[0],t.hp2[1]);G.eMaxHp2=G.ehp2;G.eblk2=0}
  else{G.ehp2=0;G.eMaxHp2=0;G.eblk2=0}
  $('enemy-name').textContent=t.name+(G.ehp2>0?` + 小蝠`:'');
  $('enemy-sprite').textContent=t.spr+(G.ehp2>0?t.spr2||'🦇':'');
}

function shuffleIntoDeck(){
  G.deck=[...G.deck,...G.discard,...G.exhaust];G.discard=[];G.exhaust=[];
  shuffle(G.deck);
}

function startTurn(){
  G.turn++;G.sp=G.maxSp;G.blk=0;G.firePlayed=0;G.drugUsed=false;G.playHist={};
  if(G.baicaoPerTurn>0) G.blk+=G.baicaoPerTurn;
  // 土灵根加成
  if(char.linggen==='earth') G.blk+=3;
  // 丹药初始格挡
  char.equippedPills.forEach(p=>{if(p.block) G.blk+=p.block});
  let drawCount=5;
  // 水灵根首回合多抽
  if(G.turn===1&&char.linggen==='water') drawCount++;
  // 聚灵佩首回合多抽
  if(G.turn===1&&char.equippedArtifacts.some(a=>a.draw1)) drawCount++;
  for(let i=0;i<drawCount;i++) drawCard();
  showIntent();
  log(`—— 第${G.turn}回合 ——`,'log-info');
  updateUI();
}

function drawCard(){
  if(G.deck.length===0){if(G.discard.length===0)return;G.deck=[...G.discard];G.discard=[];shuffle(G.deck)}
  if(G.deck.length>0) G.hand.push(G.deck.pop());
}

function showIntent(){
  let t=G.etemplate;
  let intents=t.rageIntents&&G.ehp<t.rageAt?t.rageIntents:t.intents;
  let intent=intents[G.intIdx%intents.length];
  let html=`<span>${intent.ic}</span> ${intent.n} ${intent.d?`<span style="color:#e74c3c">${intent.d}${t.enrageBelow&&G.ehp<t.enrageBelow?'+'+t.enrageBonus:''}伤害</span>`:''}${intent.blk?`<span style="color:#95a5a6">+${intent.blk}格挡</span>`:''}`;
  // 灵犀戒显示下回合意图
  if(char.equippedArtifacts.some(a=>a.seeNext)){
    let nextIdx=(G.intIdx+1)%intents.length;
    let ni=intents[nextIdx];
    html+=` <span style="color:#9b59b6;font-size:12px">(下回合:${ni.n}${ni.d?' '+ni.d:'')}${ni.blk?' +🛡️'+ni.blk:''})</span>`;
  }
  $('enemy-intent').innerHTML=html;
}

function updateUI(){
  $('player-hp-fill').style.width=Math.max(0,G.hp/G.maxHp*100)+'%';
  $('player-hp-text').textContent=`❤️ ${Math.max(0,G.hp)} / ${G.maxHp}`;
  $('spirit-display').textContent=`🔮 ${G.sp} / ${G.maxSp}`;
  $('block-display').textContent=`🛡️ ${G.blk}`;
  let ps='';
  if(G.nextAtk>0) ps+=`<span class="status-badge status-str">攻击+${G.nextAtk}</span>`;
  $('player-status').innerHTML=ps;
  $('enemy-hp-fill').style.width=Math.max(0,G.ehp/G.eMaxHp*100)+'%';
  $('enemy-hp-text').textContent=`HP ${Math.max(0,G.ehp)} / ${G.eMaxHp}${G.ehp2>0?` | 小蝠 ${G.ehp2}/${G.eMaxHp2}`:''}`;
  let es='';
  if(G.eblk>0) es+=`<span class="status-badge status-block">🛡️${G.eblk}</span>`;
  if(G.eburn>0) es+=`<span class="status-badge status-burn">🔥${G.eburn}</span>`;
  if(G.epoison>0) es+=`<span class="status-badge status-poison">☠️${G.epoison}</span>`;
  $('enemy-status').innerHTML=es;
  renderHand();
  renderDrugs();
}

function renderHand(){
  let ha=$('hand-area');ha.innerHTML='';
  G.hand.forEach((c,i)=>{
    let can=G.sp>=c.cost&&G.inBattle;
    let el=document.createElement('div');
    el.className=`card ${EL_C[c.el]||'card-none'}${can?'':' disabled'}`;
    let desc=c.desc;
    if(c.name==='火鸦'&&G.fireCrowBonus>0) desc=`造成${6+G.fireCrowBonus}伤害`;
    el.innerHTML=`<div class="cost">${c.cost}</div><div class="card-name">${c.name}${c.upgraded?' ★':''}</div><div class="card-desc">${desc}</div><div class="card-type">${c.type==='atk'?'符箓':c.type==='def'?'防御':'功法'}·${EL_N[c.el]||'?'}</div>`;
    if(can){
      if(G.ehp2>0){
        el.onclick=()=>{G.target=i<=1?1:0;playCardWithTarget(i)};
      } else {
        el.onclick=()=>playCard(i);
      }
    }
    ha.appendChild(el);
  });
}

function renderDrugs(){
  let db=$('drug-bar');db.innerHTML='';
  DRUGS.forEach((d,i)=>{
    let cnt=G.drugs[i]||0;if(cnt<=0)return;
    let btn=document.createElement('button');btn.className='drug-btn';
    btn.textContent=`${d.name}×${cnt}`;
    btn.disabled=G.drugUsed||!G.inBattle;
    btn.onclick=()=>useDrug(i);
    db.appendChild(btn);
  });
}

function playCard(idx){_playCard(idx,1)}
function playCardWithTarget(idx){
  let ha=$('hand-area');
  let ta=document.createElement('div');
  ta.style.cssText='position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:99';
  ta.innerHTML=`<button class="btn btn-sm" onclick="_playCard(${idx},1)" style="font-size:12px;padding:5px 15px">打 ${G.ename}</button>`;
  if(G.ehp2>0) ta.innerHTML+=`<button class="btn btn-sm" onclick="_playCard(${idx},2)" style="font-size:12px;padding:5px 15px">打 小蝠</button>`;
  ha.appendChild(ta);
}

function _playCard(idx,target){
  if(!G.inBattle)return;
  let c=G.hand[idx];
  if(G.sp<c.cost)return;
  G.sp-=c.cost;
  G.hand.splice(idx,1);
  if(c.el==='fire') G.firePlayed++;
  G.playHist[c.name]=(G.playHist[c.name]||0)+1;
  if(G.playHist[c.name]>=2){showCombo(G.playHist[c.name])}

  if(c.name==='火鸦变'){G.fireCrowBonus+=3;log(`🔥 火鸦变！所有火鸦+3伤害`,'log-combo')}
  if(c.name==='丹意凝形'){G.danYiStacks++;log(`丹意+1层（当前${G.danYiStacks}层）`,'log-info')}
  if(c.name==='百草护元'){G.baicaoPerTurn+=3;log(`百草护元！每回合+3格挡`,'log-block')}
  if(c.name==='灵气运转'){drawCard();drawCard();if(G.hand.length>0){G.discard.push(G.hand.pop())}log(`灵气运转：抽2弃1`,'log-info');G.discard.push(c);updateUI();return}
  if(c.nextAtk>0){G.nextAtk+=c.nextAtk;log(`打出【${c.name}】→ 下次攻击+${c.nextAtk}`,'log-info');G.discard.push(c);updateUI();return}

  let totalDmg=0;
  if(c.dmg>0||c.name==='以毒攻毒'){
    if(c.name==='以毒攻毒'){totalDmg=Math.min(G.epoison,15)}
    else{
      totalDmg=c.dmg+(c.name==='火鸦'?G.fireCrowBonus:0)+G.nextAtk+G.danYiStacks;
      // 火灵根加成
      if(char.linggen==='fire'&&c.type==='atk') totalDmg+=1;
      // 玄铁剑加成
      char.equippedArtifacts.forEach(a=>{if(a.atkDmg&&c.type==='atk') totalDmg+=a.atkDmg});
      // 烈焰丹加成
      char.equippedPills.forEach(p=>{if(p.burn&&c.burn>0) totalDmg+=0}); // burn bonus applied below
      G.nextAtk=0;
    }
    // 金灵根暴击
    if(char.linggen==='metal'&&Math.random()<0.1){totalDmg*=2;log('💥 暴击！','log-combo')}
    let tBlk=target===2?G.eblk2:G.eblk;
    let blocked=Math.min(tBlk,totalDmg);
    let actual=totalDmg-blocked;
    if(target===2){G.eblk2-=blocked;G.ehp2-=actual}else{G.eblk-=blocked;G.ehp-=actual}
    let tName=target===2?'小蝠':G.ename;
    log(`打出【${c.name}】→ ${tName} ${totalDmg}伤害${blocked>0?'(挡'+blocked+')':''}`,'log-damage');
    let es=$('enemy-sprite');es.classList.add('hurt');setTimeout(()=>es.classList.remove('hurt'),200);
    if(c.name==='火鸦'&&G.playHist[c.name]>=2){let eb=G.playHist[c.name]>=3?2:1;G.eburn+=eb;log(`🔥火鸦连击！+${eb}灼烧`,'log-combo')}
    if(c.name==='炼狱火海'){
      let other=target===1?2:1;
      let oHp=other===1?G.ehp:G.ehp2;
      if(oHp>0){if(other===1)G.ehp-=totalDmg;else G.ehp2-=totalDmg;log(`炼狱火海波及${other===1?G.ename:'小蝠'}→${totalDmg}伤害`,'log-damage')}
    }
  }
  if(c.blk>0){
    let blkAmt=c.blk;
    // 土灵根加成
    if(char.linggen==='earth') blkAmt+=2;
    G.blk+=blkAmt;log(`打出【${c.name}】→ +${blkAmt}格挡`,'log-block');
  }
  if(c.burn>0){
    let burnAmt=c.burn;
    char.equippedPills.forEach(p=>{if(p.burn) burnAmt+=p.burn});
    G.eburn+=burnAmt;log(`🔥 +${burnAmt}灼烧`,'log-burn');
  }
  if(c.poison>0){
    let psnAmt=c.poison;
    char.equippedPills.forEach(p=>{if(p.poison) psnAmt+=p.poison});
    G.epoison+=psnAmt;log(`☠️ +${psnAmt}中毒`,'log-burn');
  }
  if(c.draw>0){for(let i=0;i<c.draw;i++)drawCard();log(`打出【${c.name}】→ 抽${c.draw}张`,'log-info')}
  if(c.heal>0){
    let healAmt=c.heal;
    if(char.linggen==='wood') healAmt+=2;
    G.hp=Math.min(G.maxHp,G.hp+healAmt);log(`💚 回复${healAmt}生命`,'log-heal');
  }
  if(c.spFire>0){let has=G.hand.some(h=>h.el==='fire');if(has){G.sp++;log(`打出【${c.name}】→ 火牌在手+1灵力`,'log-info')};drawCard()}
  if(c.blkPerFire>0){let b=G.firePlayed*c.blkPerFire;G.blk+=b;log(`打出【${c.name}】→ ${G.firePlayed}张火牌→${b}格挡`,'log-block')}

  G.discard.push(c);
  if(G.ehp<=0&&G.ehp2>0){
    G.ehp=G.ehp2;G.eMaxHp=G.eMaxHp2;G.eblk=G.eblk2;
    G.ehp2=0;G.eMaxHp2=0;G.eblk2=0;
    G.ename='小蝠';$('enemy-name').textContent='小蝠';$('enemy-sprite').textContent='🦇';
    log(`${G.etemplate.name}被击败！小蝠接替战斗`,'log-info');
  }
  if(G.ehp<=0){enemyDefeated();return}
  updateUI();
}

function showCombo(n){
  let p=document.createElement('div');p.className='combo-popup';p.textContent=`🔥${n}连击!`;
  $('battle-screen').appendChild(p);setTimeout(()=>p.remove(),1000);
}

function endPlayerTurn(){
  if(!G.inBattle)return;
  G.discard.push(...G.hand);G.hand=[];G.playHist={};
  if(G.eburn>0){G.ehp-=G.eburn;log(`🔥灼烧 ${G.eburn}伤害`,'log-burn');G.eburn=Math.max(0,G.eburn-1)}
  let t=G.etemplate;
  let intents=t.rageIntents&&G.ehp<t.rageAt?t.rageIntents:t.intents;
  let intent=intents[G.intIdx%intents.length];
  if(intent.n==='产卵'&&G.ehp2<=0){G.ehp2=8;G.eMaxHp2=8;G.eblk2=0;log(`蛛后产卵！小蛛出现了(8HP)`,'log-info')}
  if(intent.d>0){
    let dmg=intent.d;
    if(t.enrageBelow&&G.ehp<t.enrageBelow) dmg+=t.enrageBonus;
    // 金丝甲减伤
    char.equippedArtifacts.forEach(a=>{if(a.dmgReduce) dmg=Math.max(0,dmg-a.dmgReduce)});
    let blocked=Math.min(G.blk,dmg);let actual=dmg-blocked;G.blk-=blocked;G.hp-=actual;
    log(`${G.ename}【${intent.n}】→ ${dmg}伤害${blocked>0?'(挡'+blocked+')':''}`,'log-damage');
    if(intent.lsteal){let s=Math.floor(actual*intent.lsteal);G.ehp=Math.min(G.eMaxHp,G.ehp+s);if(s>0)log(`🧛回复${s}生命`,'log-heal')}
    if(G.ehp2>0){let d2=rand(3,5);char.equippedArtifacts.forEach(a=>{if(a.dmgReduce) d2=Math.max(0,d2-a.dmgReduce)});let b2=Math.min(G.blk,d2);G.hp-=(d2-b2);G.blk-=b2;log(`小蝠攻击→${d2}伤害${b2>0?'(挡'+b2+')':''}`,'log-damage')}
  }
  if(intent.blk>0){G.eblk+=intent.blk;log(`${G.ename}获得${intent.blk}格挡`,'log-block')}
  if(G.epoison>0){G.ehp-=G.epoison;log(`☠️中毒 ${G.epoison}伤害`,'log-burn');G.epoison=Math.max(0,G.epoison-1)}
  G.intIdx++;
  // 木灵珠战斗后回血不在回合结束，在战斗结束
  if(G.ehp<=0&&G.ehp2<=0){enemyDefeated();return}
  if(G.hp<=0){playerDefeated();return}
  startTurn();
}

function useDrug(i){
  if(G.drugUsed||!G.inBattle)return;
  let d=DRUGS[i];if(!G.drugs[i]||G.drugs[i]<=0)return;
  G.drugs[i]--;G.drugUsed=true;
  if(d.heal){let h=d.heal;if(char.linggen==='wood') h+=2;G.hp=Math.min(G.maxHp,G.hp+h);log(`💊${d.name}→回复${h}生命`,'log-heal')}
  if(d.nextAtk){G.nextAtk+=d.nextAtk;log(`💊${d.name}→攻击+${d.nextAtk}`,'log-info')}
  if(d.blk){G.blk+=d.blk;log(`💊${d.name}→+${d.blk}格挡`,'log-block')}
  updateUI();
}

function addMaterials(normal,elite,boss){
  if(normal){G.runLingcao+=2}
  if(elite){G.runLingcao+=3;G.runKuangshi+=2}
  if(boss){G.runLingcao+=5;G.runKuangshi+=3}
}

function enemyDefeated(){
  G.inBattle=false;G.discard.push(...G.hand);G.hand=[];
  log(`—— ${G.ename} 被击败！——`,'log-combo');
  let isElite=MAP[G.nodeIdx]==='E';
  let isBoss=MAP[G.nodeIdx]==='B';
  addMaterials(!isElite&&!isBoss,isElite,isBoss);
  // 木灵珠回血
  char.equippedArtifacts.forEach(a=>{if(a.healAfter){G.hp=Math.min(G.maxHp,G.hp+a.healAfter);log(`🔮 木灵珠回复${a.healAfter}生命`,'log-heal')}});
  G.nodeIdx++;
  if(isBoss){victory();return}
  updateUI();
  setTimeout(()=>{showCardSelect(isElite)},800);
}

function playerDefeated(){
  G.inBattle=false;
  let isElite=MAP[G.nodeIdx]==='E';
  addMaterials(true,isElite,false);
  setTimeout(()=>{
    show('end-screen');$('end-title').textContent='💀 魂归轮回';$('end-title').style.color='#e74c3c';
    $('end-desc').textContent=`倒在了${G.ename}面前…第${G.nodeIdx+1}/${MAP.length}层`;
    $('end-reward').textContent=`获得：🌿 灵草×${G.runLingcao} ⛏️ 矿石×${G.runKuangshi}`;
    $('end-deck').textContent='最终牌组：'+G.deck.map(c=>c.name).join(', ');
  },800);
}

function victory(){
  setTimeout(()=>{
    show('end-screen');$('end-title').textContent='🎉 通关幽冥谷！';$('end-title').style.color='#f1c40f';
    $('end-desc').textContent=`剩余${G.hp}生命 | 共${G.turn}回合`;
    $('end-reward').textContent=`获得：🌿 灵草×${G.runLingcao} ⛏️ 矿石×${G.runKuangshi}`;
    let allCards=[...G.deck,...G.discard,...G.hand];
    let cardNames={};allCards.forEach(c=>{cardNames[c.name]=(cardNames[c.name]||0)+1});
    $('end-deck').textContent='最终牌组：'+Object.entries(cardNames).map(([n,c])=>`${n}×${c}`).join(', ');
  },800);
}

function backToHub(){
  char.lingcao+=G.runLingcao;
  char.kuangshi+=G.runKuangshi;
  // 战斗修为奖励
  char.xiuwei+=G.nodeIdx*20+G.turn*2;
  saveChar();
  renderHub();
  show('hub-screen');
}

function showCardSelect(isElite){
  let count=isElite?4:3;
  let pool=[...POOL].sort(()=>Math.random()-.5).slice(0,count);
  let cs=$('card-choices');cs.innerHTML='';
  $('card-select-title').textContent=isElite?'💎 精英击败！选择卡牌（+可移除1张）':'✨ 选择一张卡牌';
  if(isElite){
    let rb=document.createElement('button');rb.className='btn btn-sm';rb.textContent='🗑️ 移除1张牌';
    rb.style.cssText='color:#e74c3c;border-color:#e74c3c';
    rb.onclick=()=>{showRemoveCard(true)};$('card-choices').parentElement.querySelector('div').appendChild(rb);
  }
  pool.forEach(fn=>{
    let c=fn();
    let el=document.createElement('div');el.className=`card-choice ${EL_C[c.el]||'card-none'}`;
    el.innerHTML=`<div class="cost">${c.cost}</div><div style="margin-top:18px;font-size:15px;color:#d4a574;text-align:center">${c.name}</div><div style="font-size:12px;color:#8a8a9e;text-align:center;padding:10px 4px;line-height:1.5;flex:1">${c.desc}</div><div style="font-size:10px;text-align:center;color:#5a5a6e;border-top:1px solid #3a3a4e;padding-top:4px">${EL_N[c.el]||'?'}属性</div>`;
    el.onclick=()=>{G.deck.push(c);log(`获得：${c.name}`,'log-info');afterSelect()};
    cs.appendChild(el);
  });
  show('card-select-screen');
}

window.skipCard=function(){afterSelect()};
function afterSelect(){G.nodeIdx++;nextNode()}

function showRemoveCard(fromElite){
  let cs=$('card-choices');cs.innerHTML='';$('card-select-title').textContent='🗑️ 选择要移除的牌';
  let allCards=[...G.deck,...G.discard];let seen={};
  allCards.forEach((c)=>{
    if(seen[c.name])return;seen[c.name]=true;
    let el=document.createElement('div');el.className=`card-choice ${EL_C[c.el]||'card-none'}`;
    el.innerHTML=`<div class="cost">${c.cost}</div><div style="margin-top:18px;font-size:15px;color:#d4a574;text-align:center">${c.name}</div><div style="font-size:12px;color:#8a8a9e;text-align:center;padding:10px 4px;line-height:1.5;flex:1">${c.desc}</div>`;
    el.onclick=()=>{
      let idx=G.deck.findIndex(x=>x.name===c.name);
      if(idx>=0)G.deck.splice(idx,1);else{idx=G.discard.findIndex(x=>x.name===c.name);if(idx>=0)G.discard.splice(idx,1)}
      log(`移除了：${c.name}`,'log-info');afterSelect();
    };
    cs.appendChild(el);
  });
}

function showRest(){show('rest-screen')}
window.restHeal=function(){let h=Math.floor(G.maxHp*.3);G.hp=Math.min(G.maxHp,G.hp+h);log(`休息回复${h}生命`,'log-heal');G.nodeIdx++;nextNode()};
window.restUpgrade=function(){
  let rs=$('rest-screen');
  rs.innerHTML='<h2 style="color:#d4a574;font-size:24px;margin-bottom:30px">⬆️ 选择升级的卡牌</h2><div class="card-choices" id="upgrade-choices"></div><button class="btn btn-sm" onclick="skipUpgrade()" style="color:#8a8a9e;border-color:#5a5a6e;margin-top:20px">跳过</button>';
  let uc=$('upgrade-choices');let allCards=[...G.deck,...G.discard];let seen={};
  allCards.forEach(c=>{
    if(c.upgraded||seen[c.name])return;seen[c.name]=true;
    let el=document.createElement('div');el.className=`card-choice ${EL_C[c.el]||'card-none'}`;
    el.innerHTML=`<div class="cost">${c.cost}</div><div style="margin-top:18px;font-size:15px;color:#d4a574;text-align:center">${c.name}</div><div style="font-size:12px;color:#8a8a9e;text-align:center;padding:10px 4px;line-height:1.5;flex:1">${c.desc}</div>`;
    el.onclick=()=>{upgradeCard(c);G.nodeIdx++;nextNode()};
    uc.appendChild(el);
  });
};

function upgradeCard(c){
  c.upgraded=true;c.name=c.origName?c.origName+'★':c.name+'★';
  if(c.dmg>0) c.dmg=Math.ceil(c.dmg*1.5);
  if(c.blk>0) c.blk=Math.ceil(c.blk*1.5);
  if(c.burn>0) c.burn+=1;
  if(c.poison>0) c.poison+=2;
  if(c.draw>0) c.draw+=1;
  if(c.cost>0) c.cost=Math.max(0,c.cost-1);
  c.desc=c.desc+' (已强化)';
  log(`升级了：${c.name}`,'log-combo');
}

window.skipUpgrade=function(){G.nodeIdx++;nextNode()};
window.restRemove=function(){
  let rs=$('rest-screen');
  rs.innerHTML='<h2 style="color:#d4a574;font-size:24px;margin-bottom:30px">🗑️ 选择移除的牌</h2><div class="card-choices" id="remove-choices"></div><button class="btn btn-sm" onclick="skipRemove()" style="color:#8a8a9e;border-color:#5a5a6e;margin-top:20px">跳过</button>';
  let rc=$('remove-choices');let allCards=[...G.deck,...G.discard];let seen={};
  allCards.forEach(c=>{
    if(seen[c.name])return;seen[c.name]=true;
    let el=document.createElement('div');el.className=`card-choice ${EL_C[c.el]||'card-none'}`;
    el.innerHTML=`<div class="cost">${c.cost}</div><div style="margin-top:18px;font-size:15px;color:#d4a574;text-align:center">${c.name}</div><div style="font-size:12px;color:#8a8a9e;text-align:center;padding:10px 4px;line-height:1.5;flex:1">${c.desc}</div>`;
    el.onclick=()=>{
      let idx=G.deck.findIndex(x=>x.name===c.name);
      if(idx>=0)G.deck.splice(idx,1);else{idx=G.discard.findIndex(x=>x.name===c.name);if(idx>=0)G.discard.splice(idx,1)}
      log(`移除了：${c.name}`,'log-info');G.nodeIdx++;nextNode();
    };
    rc.appendChild(el);
  });
};
window.skipRemove=function(){G.nodeIdx++;nextNode()};

// ===== 初始化 =====
loadChar();
renderHub();
show('hub-screen');
</script>
